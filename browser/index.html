<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kannada Bible Output</title>

  <style>
    /* OBS/CEF often treats 100vh + flex oddly; fixed bottom is reliable */
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      font-family: "Noto Sans Kannada", sans-serif;
      overflow: hidden;
    }

    #verseBox {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      padding: 24px 50px 52px;
      box-sizing: border-box;
      text-align: center;
    }

    #verseBody {
      display: inline-block;
      max-width: 95%;
      text-align: center;
      line-height: 1.45;
      color: #ffffff;
      font-weight: 700;
      text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.9);
    }

    #verseBody .verse-reference {
      display: block;
      margin-top: 0.5em;
      font-weight: 600;
      color: #ffffff;
      text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.9);
    }
  </style>
</head>

<body>
  <div id="verseBox">
    <div id="verseBody">Loading...</div>
  </div>

  <script>
    function buildReference(data) {
      let ref = (data.reference || "").trim();
      if (ref) return ref;
      const { book, chapter, verseNum } = data;
      if (book && chapter !== "" && chapter != null && verseNum !== "" && verseNum != null) {
        return `${book} ${chapter}:${verseNum}`;
      }
      return "";
    }

    function renderOverlay(verse, reference, fontSize) {
      const bodyEl = document.getElementById("verseBody");
      const size = Math.max(12, parseInt(fontSize, 10) || 60);
      bodyEl.style.fontSize = size + "px";

      bodyEl.replaceChildren();

      if (!verse) {
        bodyEl.textContent = "Select a verse in the dock";
        return;
      }

      bodyEl.appendChild(document.createTextNode(verse));

      if (reference) {
        const refEl = document.createElement("span");
        refEl.className = "verse-reference";
        refEl.textContent = reference;
        refEl.style.fontSize = Math.max(10, size - 3) + "px";
        bodyEl.appendChild(refEl);
      }
    }

    async function updateVerse() {
      try {
        const res = await fetch("/api/state?_=" + Date.now(), {
          cache: "no-store",
        });
        const data = await res.json();
        const verse = data.verse || "";
        const reference = buildReference(data);
        renderOverlay(verse, reference, data.fontSize || "60");
      } catch (e) {
        const bodyEl = document.getElementById("verseBody");
        bodyEl.textContent = "Connecting...";
      }
    }

    updateVerse();
    setInterval(updateVerse, 150);
  </script>
</body>
</html>
