<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kannada Bible Output</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: "Noto Sans Kannada", sans-serif;
      overflow: hidden;
    }

    #verseBox {
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 50px;
      box-sizing: border-box;
    }

    #verseCard {
      text-align: center;
      max-width: 95%;
      line-height: 1.45;
      background: transparent;
      padding: 0;
    }

    #verseBody {
      display: block;
      color: #ffffff;
      font-weight: 700;
      text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.9);
    }

    #referenceText {
      display: block;
      color: #ffffff;
      font-weight: 600;
      margin-top: 0.45em;
      text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.9);
    }

    #verseCard.empty #referenceText {
      display: none;
    }
  </style>
</head>

<body>
  <div id="verseBox">
    <div id="verseCard" class="empty">
      <div id="verseBody">Loading...</div>
      <div id="referenceText"></div>
    </div>
  </div>

  <script>
    async function updateVerse() {
      const card = document.getElementById("verseCard");
      const refEl = document.getElementById("referenceText");
      const bodyEl = document.getElementById("verseBody");

      try {
        const res = await fetch("/api/state", { cache: "no-store" });
        const {
          verse = "",
          reference = "",
          fontSize = "60",
        } = await res.json();

        const size = Math.max(12, parseInt(fontSize, 10) || 60);
        bodyEl.style.fontSize = size + "px";
        refEl.style.fontSize = Math.round(size * 0.48) + "px";

        if (verse) {
          card.classList.remove("empty");
          refEl.textContent = reference || "";
          bodyEl.textContent = verse;
        } else {
          card.classList.add("empty");
          refEl.textContent = "";
          bodyEl.textContent = "Select a verse in the dock";
          bodyEl.style.fontSize = size + "px";
        }
      } catch (e) {
        card.classList.add("empty");
        refEl.textContent = "";
        bodyEl.textContent = "Connecting...";
      }
    }

    updateVerse();
    setInterval(updateVerse, 150);
  </script>
</body>
</html>
