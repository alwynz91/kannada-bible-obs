<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kannada Bible Output</title>

  <style>
    /*
      Tune this box to match your lower-third graphic (UHD 3840×2160 template).
      Values are % of the full browser source (set OBS Browser to 3840×2160 to match).
    */
    :root {
      --lz-inset-left: 12%;
      --lz-inset-right: 12%;
      --lz-inset-bottom: 6%;
      --lz-height: 22%;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      font-family: "Noto Sans Kannada", sans-serif;
      overflow: hidden;
    }

    #stage {
      position: fixed;
      inset: 0;
      background: #000;
    }

    #bgVideo {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: 50% 50%;
      z-index: 0;
    }

    #bgVideo.hidden {
      display: none;
    }

    /* Verse + reference only inside this rectangle (lower-third safe area) */
    #verseBox {
      position: absolute;
      left: var(--lz-inset-left);
      right: var(--lz-inset-right);
      bottom: var(--lz-inset-bottom);
      height: var(--lz-height);
      box-sizing: border-box;
      padding: 0.35em 0.5em;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      z-index: 1;
      overflow: hidden;
      pointer-events: none;
    }

    #verseBody {
      display: block;
      max-width: 100%;
      max-height: 100%;
      overflow: hidden;
      color: #ffffff;
      font-weight: 700;
      text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.9);
      line-height: 1.35;
      word-wrap: break-word;
    }

    #verseBody .verse-reference {
      display: block;
      margin-top: 0.35em;
      font-weight: 600;
      color: #ffffff;
      text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.9);
    }
  </style>
</head>

<body>
  <div id="stage">
    <video
      id="bgVideo"
      autoplay
      muted
      loop
      playsinline
      preload="auto"
    >
      <source src="assets/lower-third.mp4" type="video/mp4" />
      <source src="assets/lower-third.mov" type="video/quicktime" />
    </video>
    <div id="verseBox">
      <div id="verseBody">Loading...</div>
    </div>
  </div>

  <script>
    (function setupVideo() {
      const v = document.getElementById("bgVideo");
      v.addEventListener("error", () => {
        v.classList.add("hidden");
      });
      v.play().catch(() => {
        v.classList.add("hidden");
      });
    })();

    function buildReference(data) {
      let ref = (data.reference || "").trim();
      if (ref) return ref;
      const { book, chapter, verseNum } = data;
      if (book && chapter !== "" && chapter != null && verseNum !== "" && verseNum != null) {
        return `${book} ${chapter}:${verseNum}`;
      }
      return "";
    }

    function renderOverlay(verse, reference, fontSize) {
      const bodyEl = document.getElementById("verseBody");
      const size = Math.max(12, parseInt(fontSize, 10) || 60);
      bodyEl.style.fontSize = size + "px";

      bodyEl.replaceChildren();

      if (!verse) {
        bodyEl.textContent = "Select a verse in the dock";
        return;
      }

      bodyEl.appendChild(document.createTextNode(verse));

      if (reference) {
        const refEl = document.createElement("span");
        refEl.className = "verse-reference";
        refEl.textContent = reference;
        refEl.style.fontSize = Math.max(10, size - 3) + "px";
        bodyEl.appendChild(refEl);
      }
    }

    async function updateVerse() {
      try {
        const res = await fetch("/api/state?_=" + Date.now(), {
          cache: "no-store",
        });
        const data = await res.json();
        const verse = data.verse || "";
        const reference = buildReference(data);
        renderOverlay(verse, reference, data.fontSize || "60");
      } catch (e) {
        const bodyEl = document.getElementById("verseBody");
        bodyEl.textContent = "Connecting...";
      }
    }

    updateVerse();
    setInterval(updateVerse, 150);
  </script>
</body>
</html>
