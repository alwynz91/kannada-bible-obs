<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kannada Bible Dock</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="container">

    <h2>📖 Kannada Bible Dock</h2>

    <div class="search-wrap">
      <input
        id="searchInput"
        type="text"
        placeholder="Book only (Genesis, 1 Kings) or book + chapter (Genesis 5) — Enter"
        autocomplete="off"
        spellcheck="false"
      />
      <div id="suggestPanel" class="suggest-panel hidden" aria-label="Book suggestions"></div>
    </div>
    <p class="shortcut-hint">⌘A / Ctrl+A — copy all verses in the list (click outside the search box first)</p>

    <div class="settings">
      <label>Font Size</label>
      <input type="range" id="fontSize" min="20" max="120" value="60">
    </div>

    <div id="verseList"></div>

    <div id="dockToast" role="status" aria-live="polite"></div>
  </div>

  <script src="dock.js"></script>
</body>
</html>
